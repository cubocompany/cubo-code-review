name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:src

      - name: Build (TypeScript → JavaScript)
        run: pnpm run build

      - name: Bundle with ncc (single-file, no node_modules needed)
        run: pnpx @vercel/ncc build dist/src/main.js --out dist/bundle --source-map --license licenses.txt

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: |
            dist/bundle/
          retention-days: 1

  release:
    name: Publish Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push back the built dist
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-bundle
          path: dist/bundle/

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit built dist to repo
        run: |
          git add dist/bundle/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: build dist for ${GITHUB_REF_NAME}"

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Force-update tag to include built dist
        run: |
          git tag -f "${{ steps.tag.outputs.name }}"
          git push origin "refs/tags/${{ steps.tag.outputs.name }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: dist/bundle/licenses.txt
